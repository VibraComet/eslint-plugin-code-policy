name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Version or Publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write        # to create git tags and push version commits
      pull-requests: write   # to open the "Version Packages" PR
      id-token: write        # to enable npm provenance (OIDC)

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history required for changesets to detect what changed
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          # Run on "Version Packages" PR merge → publish to npm
          publish: pnpm release
          # Update versions and changelogs in the automated PR
          version: pnpm changeset version
          # The commit and PR title used by the bot
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # setup-node with registry-url writes .npmrc expecting NODE_AUTH_TOKEN
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Enables npm provenance — links the published package to this repo
          NPM_CONFIG_PROVENANCE: "true"
